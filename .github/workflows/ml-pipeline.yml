name: ML Model CI/CD

on: [push]

jobs:

  linter:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Linter
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --exit-zero

  train:
    needs: linter
    runs-on: ubuntu-latest
    
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Pull Data (DVC)
        run: dvc pull
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}

      - name: Train Model
        run: python src/train.py 2> error_logs.txt

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
      
      - name: Upload Training Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-report
          path: error_logs.txt

      - name: Cleanup temporary cloud volumes
        # This step runs no matter what, preventing zombie cloud instances
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

  deploy:
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Accuracy Threshold
        run: python check_threshold.py

      - name: Mock Docker Build
        run: |
          RUN_ID=$(grep '^run_id=' model_info.txt | cut -d'=' -f2)
          docker build --build-arg RUN_ID=$RUN_ID -t sketch-classifier:$RUN_ID .